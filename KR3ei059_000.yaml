因高取物胞系有傷兒啼腹中則令妊母曲身向地拾物須臾即止若腹中作鐘鳴聲者取鼠穴中土噙之八九月喑不能言者不須治之產後即愈凡胎動無故而動及體素羸弱者乃衝任脈虛不得固攝當大補之腹痛者宜行其氣損傷者宜行其血余各因其所由治之未及期而產謂之半產即墮胎也損氣耗血甚於正產二三月猶輕六七月為最重譬之果未熟而強摘之其根蒂必傷也故凡半產當與正產同其調養而尤加意焉宜因其所傷而補益之以善其後前列諸法皆可參用若輕易視之則一次半產後遂習以為常不得謂非失治之過也半產後治疾之法與正產稍異蓋正產惡露多半產惡露少也若有腹痛等疾宜溫補之逐瘀破血之藥用宜審察若數日後大熱而渴面紅眼赤欲飲涼水晝夜不息此大虛也寒涼下咽即死不治宜當歸補血湯當歸補血湯黃耆一兩當歸二錢水煎作一服見內外傷辨若血崩不止者宜攝陰湯攝陰湯黃耆五錢阿膠三錢歸身二錢白朮二錢甘草五分炙棕櫚皮一錢炙烏賊骨一錢五分炙荊芥一錢炒其他諸症並詳正產相時度勢消息用之未可拘泥為也下篇辨產第六孕滿十月待時而生自然之道無所勉強而世俗不察或未產而強速之致有橫逆之變推其故由於未明其理不辨其候而然故初覺腹痛遂謂欲生稍事遲延遂謂難產方藥以攻之非法以擾之使氣瞀神亂子母俱死富室巨家其弊尤多本安也而自危之本生也而自殺之可憫也已辨產之法脈經曰妊婦月滿則脈離經離經者難經所謂一呼三至曰離經一呼一至亦曰離經也又曰尺脈轉急如切繩轉珠者欲產也千金方論曰將產者離經離經者其脈浮朱彥修曰離經六至沉細而滑按切繩轉珠動疾之象即一呼三至之義一呼三至一吸三至呼吸定息脈七至閏以太息脈八至疾之甚也朱說與千金方不同當以難經脈經為正要之胎動欲產無論浮沉遲速皆有動象無動象者非正產也正產腹痛必連腰及臍或牽引脊背胎氣陷下或目中生火穀道挺迸漿血下後腹痛愈緊乃為欲生若漸痛漸緩或乍緊乍慢即漿血交下皆非正生達生編言試痛正產之辨誤以試痛為正產之害推勘極精多可採者達生編云初覺腹痛第一以忍痛為主無論為主產為試痛痛久自生更宜養神惜力以安睡為妙不可輕易臨盆蓋子居母腹端坐不動至生時轉身向下妊母安臥腹中不至逼窄易於轉身若未及轉身遂使坐草則嬰兒難於轉運復用力以注之則是先出而成逆產轉身未定用力逼之則手先出而為橫生或首骨偏礙而為偏產種種弊端皆基於欲速之故故臨盆以緩為正即使過遲亦無妨礙也又曰孕至八九月或妊母有火起居不時令孕不安因而作痛所謂試痛也但須照常眠食甚則服安胎藥一二劑即止若誤作欲產遽令坐草即使勉強能生母氣必損子亦多夭猶之剖卵出雛裂繭取蛹安望生耶又曰腹痛有感寒傷食之候亦宜辨別傷食者當臍而痛手按轉加或臍旁如有膹起者不連腰及脊寒痛多在臍下綿綿延延無所增減得暖稍安也凡此皆極言欲速之害而歸於辨產未明蓋妊母多畏難產而欲速產者在主者察脈晰理明辨而調抑之事常而易變苟不慎察戕害生命亦非俯育之道慎毋謂闈房瑣屑之事非丈夫所宜知而忽略視之也產戒第七產育順事而俗人多擾亂之致反順為逆此雖習俗使然亦不知之過也輯產時所當戒者著於篇使覽者凜焉妊母將產率多疑懼腹痛緊急氣血下注神不能安易於驚惶初次產育尤為易擾而不知者稍有不順輒恐懼無主大事張皇致妊母心亂神散氣憊而逆氣逆則血湧氣憊則力衰嬰兒之生雖自能轉動亦藉母氣助之氣逆力衰何以能下唯宜溫慰妊母使勿驚疑即有不順勿使知覺俾心定氣凝神安力旺無論本屬順生即遇惡候亦可反逆為順也千金方論云產事雖系穢惡然不得令死喪汙穢之人視之犯者多致難產又忌多人瞻視惟得一二人在室產後乃可告人亦以人眾則易於驚擾致妊母心神不定故也室中宜適溫涼夏暑過甚勿掩門戶以器貯新汲水石許置室中以闢熱氣免致昏暈天寒宜置火暖之毋得太熾令火氣熏灼室中人毋大聲毋多語毋嗟咨太息參訝駭毋叱吒毋祈神問卜宜安靜如常妊母宜惜力宜安臥臥宜正不可左右毋摩腹毋按腰毋妄動毋輕坐草初產及天寒尤忌美其飲食頻頻與之若虛羸者不能多食以糜粥雜入參末飲之毋亂服方藥毋輕試異術必辨明正產胞水已下交骨不開或交骨已開而子久不下擇平和之藥稍稍助之要之產前調攝既善亦無須此接兒老嫗俗謂穩婆宜預擇妥善者用之蓋隱曲之事非此輩不能為而愚蠢奸狡之輩或妄為動作故事恐嚇戕人性命以炫己之術不可不慎大率以年老為佳蓋年老則歷事多而性稍醇也產後勿問男女須收拾既定然後告人世有急於求嗣者墮地得男而產母暴喜遂致昏暈得女則產母不悅家人又從旁懊惱之致有郁厥血逆之患宜預防也大凡產厄誤於張皇者半誤於怠忽者亦半產育固生人常事然苟主者不察而漫然聽之則產母無主而驚疑為害亦大往見拘迂者矯張皇之弊謂嬰兒可以自出無藉乎人因閉門安臥勿令人知而產母體素羸弱氣血虛少又性本嬌怯不能忍痛曲腰護之偏倚妨之輾轉敧仄致嬰兒不得轉動交骨不得開張氣血下注久無泄路勢必逆而上行一日之間而子母俱死如此者何啻無故而自殺之哉此皆不明其理不究其道愚而自用殘賊人偷夫產孕者生生之本天理之原似續攸關斷宜詳慎也用藥第八產時用藥有二弊焉方伎之士多取速效肆用峻利之藥以炫己之術其效者藥甫入口而難產即下眾人駭服推為神奇而不知一時便利子母大傷至產後發疾遂至不起嬰兒或墜地不舉或舉而輒夭而又委之天命歸咎後醫日殺生命而人莫之知深可痛惜古方如兔腦鼠腎蛇蛻回生諸藥只堪備至急之用安可妄試尤有甚者挾不經之術無稽之方展轉傳布謬為仙授乘人之急以脅人之利功則歸己過則歸人世俗憒憒多為所愚不可譬曉此一弊也而矯其弊者遂謂產孕本無須用藥常變順逆悉靜而聽之於天斯言誠善然必自懷妊至臨產攝養無乖然後可也苟或不善即可反順為逆而仍執勿藥之說以自愚是何異未能辟穀而謂人可勿食耶此二弊也且天下亦或有生而難產者或未孕之先即有宿疾或氣血羸弱骨格緊密脈絡堅緻皆令難產亦藉臨時藥力以扶助之但宜斟酌盡善擇平和之品醇正之法相不得不用之時而後用之如加味芎歸湯佛手散味和而力厚氣平而效速斯為善也加味芎歸湯當歸一兩川芎七錢龜板手大一片醋炙研婦人發如雞卵大一枚瓦為焙存性水一升煎四合服之見醫學入門佛手散見前孕疾篇富貴之家產後必服人參而致死者多矯其弊者並倡產後無補益之說而致死者亦多蓋不明其理左右皆誤夫產後諸疾多出於虛人參非不可用而用之亦自有法得其法益身而卻疾不得其法致疾而促生不可不辨服參之法在子方墜地參已入口一刻之間過此一刻便不可服蓋產時氣血下注上中二焦盡屬虛寒產後氣復上行下焦惡血填湊血道梗塞氣道亦滯驟加補中之藥血道未開氣道益阻遂有惡露不行瘀血上逆之患若當兒甫墮地一刻之間氣血猶未上行藏府空虛脈絡困乏人參入腹甘溫之性宅中土而運脾精輔正氣而逐惡血灑播精微灌溉經脈氣強則行速脈潤則道通惡露順下乳汁通流焉有他患且新產之後百脈皆動而下行自下而上瘀濁者去精華者留有更新之象婦人宿疾多在血分平時所不能除者此時可以除之卻病益身非妄說也凡欲服參者將產時即宜制就汁宜濃厚可以一飲而盡或以人參一二錢研為末另以錢余煮汁調服亦可令一人司之俟兒首既出即與服之參盡而兒適墮地乃為合法苟失其法為害非小而復歸咎於參之不可用豈不謬哉產時應變皆倉猝之際所有藥物亦宜預籌有備無患不可渴而掘井鬥而鑄兵也應變第九產育本順事不幸而至於逆變起倉卒安危繫於片時亦人生至急之事極難之治也應變之術宜切究焉凡產之變有五曰橫產曰逆產曰偏產曰礙產曰盤腸產橫產者兒橫腹中手臂先出治法令產母仰臥囑收生嫗徐徐推兒下身令直上以手中指摩其肩推上而正之又以手摩其耳令頭正自生或以小針刺兒手入一半分徐徐送入不入以鹽塗之逆產者兒未轉身兩足先出以鹽塗兒足心針刺如上法或以爪搔之並以鹽摩母腹兒得痛癢驚縮而轉自當回順偏產者產時兒首偏掛一傍雖近產門只露頞角終不得下治法令收生嫗以手徐徐正其頭若因腦骨偏拄穀道當以綿衣炙火令熱裹手於穀道外徐徐推之俟正然後坐草若產時兒不向產門直趨穀道者宜熬鹽令熱以紬裹於穀道外熨之礙產者兒首正抵產門久而不下此必轉身時臍帶攀掛兒項或肩當急令安臥令收生嫗推兒近上徐徐通手以中指按兒兩肩理脫之然後坐草蓋此候最為險惡慎毋輕易用力若纏繞於項復用力以注之則其纏愈緊致子死腹中不可不慎凡橫逆諸產如法拯救皆宜內服加味芎歸湯佛手散加味芎歸湯見用藥篇佛手散見孕疾篇以助之若不能用法但令靜心安臥服前藥一二劑亦效盤腸產子腸先出兒即隨下或腸隨兒下此由下焦素虛不得收攝氣血下注無以固之或用力太過一次如此凡產皆然宜以溫湯潤之溫諭產母勿令驚慌以好醋半盞新汲水加醋十之七調和驟噀產母面或背三噀則收或以磨刀水微潤腸煎磁石湯一盞飲之或以蓖麻子搗敷產母頂心視收入速洗去遲則為害內宜服補益升提之藥慎護其腸勿令見風或遭風侵多有不能收入者產時交骨不開最為惡候此由陰氣大虛血液衰少宜加味芎歸湯方見前甚者加桂少許子死腹中其候心腹脹悶重墜異常產母面赤舌青指甲皆青或口出惡臭者是也若面舌唇口俱青口沫出者子母俱死面青舌赤者母死子生宜佛手散方見前或平胃散平胃散蒼朮厚朴薑汁炒陳皮各三錢甘草一錢二分水煎加朴硝二錢化服其效頗速見局方或蟹爪湯蟹爪湯蟹爪一升甘草一尺阿膠一兩以東流水三升煮蟹爪甘草得一升去滓內膠令烊分二服見千金方若雙胎一死一生者服之能令生者安而死者出若干燥著脊不能下者宜葵子湯脂蜜酒以滑之葵子湯葵子三合阿膠一兩六錢以水一升六合煮六合頓服未效再作一服見千金方脂蜜酒豬脂白蜜各三合醇酒六合合煎取六合分二服見婦人良方按無豬脂以麻子油易之亦可產時用力太過水衣早破漿水盡下產戶乾澀或坐草日久為風所吹因而腫脹多致難產或產時子忽不動是妊母力乏之故勿誤為死肆用攻逐皆宜加味芎歸湯方見前產時妊母忽猝然氣痿暈絕目翻口噤面黑唇青口沫流出子母俱殞若兩顴微見紅色子死母生此至危之候宜霹靂丹救之霹靂丹蛇蛻一條蠶退紙並燒存性各用二錢男子頭髮饒灰路旁左足草鞋燒存性各用一錢乳香五分黑鉛二錢五分水銀七分五釐以鉛和水銀入鍋中火上熔化結如砂子研治為末和諸藥以獖豬心血和丸如梧桐子大金箔為衣每用三丸流水下或煎化灌之見醫學入門嬰兒既生胞衣不下亦多危險達生編云用力太早交骨強開兒甫出而骨即隨閉以致不下宜急斷臍帶以麻線將臍帶繫緊又雙摺之再系一道勿令風入以輕物墮之但令產母安心定氣稍遲當痿而下慎勿令收生嫗妄用手取致損及臟腑因成惡疾若血流入衣中為血所脹致不得下腹中脹滿下衝心胸疼痛喘急者宜佛手散方見前若以手按之痛稍緩者此氣虛也宜益母湯益母湯益母草一兩酒煎加童便一杯服之見達生編若危者宜牛膝湯牛膝湯滑石二錢研末木通當歸牛膝瞿麥各一錢五分冬葵子二錢共作一服見局方若急上搶心者或死胎上搶心者宜用熨法熨法取蟻垤土一升熬熱囊盛熨心下令不得上見千金方若輕者以草紙燒煙熏產母之鼻令納氣即下或以發入口作嘔亦佳千金方載產時禳法雖未明其理而頗有效驗並附著以備用凡欲產宜脫尋常所著衣籠灶頭及灶口令至密即易生若逆生者以手中指取釜底墨書兒足下作形即順生或書父名於足心或以車轄脂如上法書畫若胞衣不下取夫內衣蓋井上即出本草載臨產取赤馬皮鋪身下又以海馬石燕兩手持之皆令速產云凡應變皆以凝神息慮為主毋得張皇以擾產母心欲細而定智欲敏而速法欲簡而捷藥欲峻而安毋取劫功毋貽後患凡遇危急無不皆然不特產孕之一端也調攝第十產後調攝最宜詳慎蓋產後氣血虛少絡脈空乏肢節懈怠腠理開張皮毛不實營衛不固血道易塞氣道易滯故致疾之易而去疾之難莫甚於此產後致疾皆起於纖細易忽之間其源甚微其發至鉅闈房瑣屑之事主者所不及檢醫書所不能詳不識避忌不知防範或致疾而終身不愈或疾作而危在片時往見一婦產時至速不及告人遂產於地產後人知始扶臥於榻三日後大熱不止醫以為血瘀也而以桃仁承氣投之數日而死一時不謹為害如此況其大焉者乎故善調攝者不使致疾並可去宿患之疾不可不知也凡產後產母勿令安臥宜以高枕倚之膝宜豎起勿得伸直須閉目靜神勿令熟睡歷十二時乃可安臥少須八九時若倦怠者宜頻頻呼之常令欲醒亦毋高聲急語致使驚恐蓋產後氣血上行若遽令安睡則氣逆而血壅多致昏暈必預防之膝宜豎者膝伸則筋骨內掩恐礙惡露也嬰兒墜地即取鐵秤錘或石子入火燒紅以醋向產母淬之使氣入鼻不特可以闢穢且能收斂神氣散解惡血以杜血暈或日淬一二次三日後止更佳室中宜避風絲毫罅隙必掩塞之宜適溫涼母犯寒暑將寒即衣驟暖毋易夏雖大暑勿得解衣毋浴毋以扇招風寧失過暖毋失過寒產後宜益母草煮汁和童便服之或和清酒日三五服三日而止自產之次日始日服生化湯一劑生化湯川芎一錢當歸五錢炙甘草五分炙乾薑五分桃仁十粒去皮尖以水二盞煎一盞入清酒一合溫服五日而止瘀未盡者七日止大虛者可加人參少許服之二三日後或寒熱交作此骨合也虛人多有之但診無他患如法服生化湯勿妄用他藥十二日後惡露將盡氣血更新體虛者宜服補虛湯補虛湯人參白朮各三錢當歸川芎黃耆各二錢炙甘草陳皮各八分乾薑五分炒八味作一劑日一服見醫學入門十數服有宿疾者宜服永安湯永安湯人參一錢熟地三錢當歸三錢芎藭二錢阿膠一錢五分白朮二錢續斷一錢五分桃仁烏賊骨各一錢吳茱萸四分十味作一服食前溫進日一或澤蘭湯澤蘭湯澤蘭二錢香附二錢當歸芎藭各一錢五分芍藥烏藥各一錢人參一錢阿膠黃耆白朮各三錢紅花五分生薑二錢作一服食前溫進或羊肉湯羊肉湯羊肉十兩黃耆一兩大棗三十枚茯苓甘草當歸麥冬地黃芍藥各六錢肉桂心三錢以水六升煮羊肉取三升內藥煎取一升分三服溫進見千金方相疾之輕重體之偏寒偏熱而用之或十餘服或數十服可使宿疾盡去體弱反強飲食宜澹泊毋食鹽犯之令無乳毋食生冷堅硬一切異物參食炙煿煎炒毋過於肥膩皆令致疾十日內毋食豬肉一月內毋食豬脂犯之令經絡壅塞凡食肥甘之物皆宜去油脂以清淡為上清本乎陽可以益神而育精濁本乎陰足以致滯而成積而酸鹹之味凝血阻脈尤為切忌也產後一月俗謂之滿月二月謂之大滿月此二月內不宜力役動作不宜交合心志宜和思慮宜絕悲恐憂鬱大喜大怒皆不可犯七情傷人甚於六氣世有產後羸瘠謂之蓐勞多至不治皆不知調攝之故也懷嬰第十一千金方論曰嬰兒初生當即舉之舉之稍晚則令中寒先浴之然後斷臍斷臍不得以刃令人隔衣咬斷之以暖氣呵之然後纏結所留臍帶須令至小兒足跌短則兒腹中不調常下痢若先斷臍然後浴者則臍中水令常腹痛其臍斷訖連臍帶中多有蟲宜急撥去之不爾則入兒腹成疾裹兒臍法椎治白練令柔軟方四寸新綿厚半寸與帛等合之調其緩急急則令兒吐若十許日兒怒啼似衣中有刺者此或臍燥還刺其腹當解之易衣更裹時閉戶下帷燃火令溫暖仍以溫粉粉之若臍不愈燒絳帛末粉之若臍中水當炙粉絮以熨之不時治護浴兒法湯須調冷熱冷熱失宜令兒驚凡兒冬不可久浴久則傷寒夏不可久浴久則傷熱浴兒者以豬膽汁一枚取汁投湯中以浴之終身不患瘡疥兒生三日宜用桃根湯浴之良桃根湯桃梅李根各三兩以水三升煮二十沸去滓無根枝亦可生男宜用父故衣裹之生女宜用母故衣裹之皆勿用新帛衣不可過厚令傷兒皮膚害血脈嬰兒始生宜時見風日凡天氣和暖無風宜令乳母將兒於日中嬉戲則血凝氣剛肌肉牢密堪耐風寒不致有疾病達生編云兒生三日浴之俗謂之洗三如冬寒切不可洗然千金方謂小兒不浴令毛落則不浴亦非良法宜如上法蔽風燃火下帷而浴之又云斷臍必以艾蘸油為燃燎斷之令暖氣入腹常視之勿令濕較千金法為佳南中收生嫗斷臍多於連胞衣處斷之並留胞衣少許先繫緊然後斷之雖臍帶稍長易於妨礙然可免入風泄氣之患亦可用也嬰兒甫生氣欲絕不能啼以暖水灌之不啼以綿絮包裹之勿斷臍以紙捻蘸油燃火於臍帶下熏之令暖氣入腹更以熱醋湯蕩洗臍帶令氣回啼哭如常方可斷臍若面青身冷口噤者乃胎寒也宜殭蠶散急救之殭蠶散白殭蠶木香肉桂陳皮炙甘草檳榔各五分水煎取汁以帛蘸入兒口中見醫學入門若因臍纏喉管礙產者急去其所纏之臍輕按其背俞及胸口徐摩其喉管即氣復而啼初生有即死者急看兒口中懸雍前齶上有泡如石榴子以指摘破出血以帛拭去以發灰糝之若令惡血入口中即死初生撮口不飲乳名曰馬牙不治則死馬牙之候兒齒齦有小泡如粟米狀急以針挑出血用墨磨薄荷汁斷母發裹手指蘸擦口中令遍勿飲乳一時許即瘥初生穀道無孔不得大便急用金玉簪揣其是孔處刺通之以蘇合香少許作小鋌納孔中或以油紙鋌納孔中勿令復合若非無孔而大小便不通者氣脹欲絕令婦人以溫湯漱口吸咂前後心並臍下手足心共七處每咂三五次漱口更咂取紅色為度須臾自通不爾則死或以蔥汁乳汁各半調勻抹兒口中與乳吮下亦通若小便不通不欲飲乳者以蔥白一寸四破之以乳汁入銀石器內煎灌之若生鵝口瘡者其候口內白屑遍生舌上鼻上皆有之不能吮乳急以亂髮纏指蘸薄荷汁或井華水拭之三日當脫若不脫可煮荴木汁令濃以帛纏箸頭拭之無荴木慄木亦可或以白楊枝燒瀝塗之初生遍體無皮者以白早米粉撲之候生皮乃止若如魚泡如水晶碎則水流者以密陀僧為末糝之初生患連舌以爪摘斷之微有血出無害若血出不止以發灰敷之連舌者舌下有膜如榴子中隔連接舌下令兒言語不轉也生六七日後氣血收斂成肉則口舌喉頰清淨若喉里舌上有物如蘆管中盛水狀者若如脹起者可以綿纏長針留刃如粟米大刺決之令氣泄去青黃汁日一刺之不過三刺即愈著舌下者名曰重舌著上齶者名曰重齶治如前法初生感風鼻塞不通者取皂角草烏等分為末薑汁調敷囟門或以薑汁調天南星末敷之外腎縮入不得出者以硫黃茱萸各五錢為末以蒜汁調塗臍腹仍以蛇床子燒煙燻之初生遍體發丹毒赤腫遊走若入腹即死名曰赤遊乃胎熱也宜以細針隨赤暈周匝刺出惡血仍以芭蕉汁或蠐螬汁塗之或以赤小豆末和雞卵白塗之亦良初生二三日面目繞鼻左右皆黃閉目撮口而啼口中乾燥四肢不得伸縮者乃血脈不斂也血氣沮敗不成肌肉故有此候宜龍膽湯龍膽湯龍膽草鉤藤皮柴胡黃芩桔梗芍藥茯苓甘草各八分以水三合煮二合兒生一日至七日以三勺分三服八日至十五日以四勺分三服十六日至二十日以六勺分三服二十日至三十日以一合分三服三十日以外以二合分三服凡寒熱驚掣變蒸不解客忤驚癇食積皆可服之見千金方凡嬰兒甫出先以綿裹指拭口中及舌上惡血若啼聲發便入腹中以成百病斷臍後宜與甘草湯甘草湯以甘草如手中指一節打碎以水六勺煮取三勺見千金方以綿裹沾取與兒吮之計得一蜆殼許入腹止兒胸中有惡物者當快吐之若不吐須臾更與盡之若不吐是無惡物勿更與也凡母乳兒不欲太飽飽則嘔吐如太飽則以空乳乳之自消夏不去熱乳令兒嘔冬不去寒乳令兒咳且痢甫交合即乳令兒羸瘠交脛不能行將乳當先去宿乳又用力極挼之勿令乳急出令兒噎若急出以指按夾之噎則奪之令得息然後乳之兒若臥乳母當以臂枕之令乳與兒平令兒不噎欲寐則奪其乳恐填塞口鼻且或致過飽母臥母以口鼻向兒恐氣吹其巔頂母有熱勿乳犯之令兒變黃母怒勿乳犯之令生驚發疝上氣顛狂母醉勿乳犯之令身熱腹痛母新吐下勿乳犯之令兒虛羸皆所當慎富貴家多置乳婦而愚蠢之輩不知慎護不識避忌寒燠失候飢飽違理因而致疾者最多故善懷嬰者當自乳為善必欲置乳婦宜擇氣血清和肥白壯盛之婦毋犯胡臭癭瘻瘑疥癡癃白禿癧瘍耳聾齆鼻癲癇之疾夫乳者血氣之所為也兒之性情未定藉血氣以涵養之苟飲以惡濁之乳則氣血日昏性情日劣變清明而為愚蠢為患實深又不特致疾之一端也大凡嬰兒氣血薄弱施治難於常人小有不慎即生重疾愚醫不察拘執謬說肆用毒藥往往而殤夫疾作而治之於後曷若未疾而慎之於先未生則調之於母既生則適其飢飽量其寒溫疾從何生而煩廣施謬方遍倡邪說耶集懷嬰一篇有心保赤者所當覽也拯危第十二產後諸疾危迫者多頃刻生變有延醫治藥所不及者孫子所謂發於秋毫廣於嵩岱也而世俗治此恆昧其道稍有不順輒謂不治治之不善又不啻下石而殺之蓋能起死而定亂者鮮矣著拯危一篇以政惑焉產後血暈最為危急其候兒甫墮地母即昏絕不省人事急令婦女以膝裹綿軟舊衣曲抵產戶勿令氣泄一人以一手挽頭髮一手掩口鼻俟稍轉動乃可用藥若不醒以韭菜一把細切瓶盛之灌以熱醋以瓶口向產母鼻管熏之仍以鐵石器火燒淬醋令室中常得醋氣或以醋噀其面或以漆器燒之用藥宜辨虛實虛者其候昏悶煩亂卒然暈倒口張手撒遺尿鼾聲四肢厥冷寸口脈微細散亂或伏匿不至此正氣大虛微陽欲脫陰離陽決危在俄頃救之稍遲則氣不復返宜清魂散清魂散人參澤蘭各一錢二分炙甘草一錢當歸芎藭各二錢荊芥穗一錢作一服水煎加清酒引見婦人良方定氣飲定氣飲人參白朮阿膠各三錢炮姜熟附子各一錢大棗五枚炒粳米一撮濃煎分二服溫進獨參湯獨參湯人參四五錢長流水濃煎厚汁灌之見醫說或加炒米一撮炮姜一錢尤妙六味回陽飲六味回陽飲熟地黃五錢當歸三錢炮姜二錢熟附子二錢肉桂二錢人參三錢見幼幼集成相度用之實者心下滿急神昏口噤腹脹氣粗兩手拳握脈無虛象乃下血過少惡露上逆當破其惡血宜黑神散黑神散肉桂當歸白芍炮姜各二錢乾地黃炒黑大豆各五錢見幼幼集成奪命散救之奪命散沒藥血竭各等分治為末每用三錢童便清酒各半煎數沸服神效見丹溪心法若舌強不語者敗血壅其脈絡也宜四味散四味散當歸延胡索血竭沒藥各一錢每用二錢童便或清酒調下或並煎作湯亦可見丹溪心法若見鬼譫妄言語顛倒眼見黑花者宜辨虛實誤者即死體素虛弱下血過多昏迷不省瞑目無所知甚則循衣撮空錯語失神者虛也又謂之鬱冒暴亡其血陽神無所依附宜安神飲治之安神飲人參柏子仁去油各三錢黃耆阿膠當歸茯神各一錢肉桂炙甘草各一錢共作一服體素壯實下血未多發狂見鬼面青口噤角弓反張者實也敗血乾心亂其神明宜蘇合香丸一錢童便調服或奪命散四味散皆宜方俱見上血崩不止是謂重傷其候血暴下如注急若山崩故名曰崩唇青肉冷汗出目瞑此由陽氣大虛不得收攝故直下無制潰決而不可止宜朝宗湯朝宗湯歸身一兩芎藭乾地黃各五錢芍藥三錢人參黃耆肉桂炙甘草各二錢分二服補氣養血湯補氣養血湯人參黃耆當歸白朮芍藥阿膠芎藭各二錢艾葉青皮香附甘草各五分熟附子一錢縮砂仁一錢共作一服見萬病回春或攝陰湯治之若少腹滿痛肝藏已壞不可治矣攝陰湯熟地黃五錢人參三錢黃耆二錢當歸一錢五分荊芥穗炙棕櫚皮炙甘草炙各一錢熟附子一錢五分作一服衄血者口鼻血出不止口鼻起黑色如煙煤是胃絕也氣血散亂多不可治急以緋線一條併產母頂心發二莖合系產母手中指節令極緊仍用荊芥散荊芥穗為末每服二錢童便調下口噤開灌之見婦人良方產後大喘乃死候也此由陽氣素衰所下過多血竭於下氣留於上無所依附獨聚肺中孤陽絕陰命在呼吸宜獨參湯方見上定氣飲方見上炮姜宜易乾薑六味回陽飲方見上輕者小參蘇飲小參蘇飲濃煎蘇木汁調人參末二錢或三錢作一服見東醫寶鑑若血下少而作喘者其喘不甚由於瘀血入肺窒礙氣道宜桃仁湯治之桃仁湯桃仁二錢炒杏仁二錢炒當歸貝母各二錢茯苓二錢乾薑人參各五分若咳逆不止欲死者以肉桂五錢薑汁三合同熬稍服半合許以手摩肺俞令熱以余汁塗之時摩時塗汁盡即愈見婦人良方陰脫者子宮脫出或脫出如脫肛者蓋產時弩力所致宜當歸黃耆飲當歸黃耆飲黃耆三錢酒炒人參當歸各二錢升麻五分甘草八分上作一服水煎日二見丹溪心法若脫出如線長三四尺手觸之則痛甚者宜慎護之不可令斷斷則死以姜三片連皮搗之清油二斤和炒以油干為度以熟絹五尺許疊數層承其線屈曲作圓形納戶口以絹袋盛姜溫熨之冷即易一日夜當入其半二日當愈仍內服失笑散助之失笑散五靈脂蒲黃等分為末每服二錢童便或酒調下見局方凡產後危症皆屬虛寒惡血為患僅十之三四而昧者多以去瘀破血賅之肆用攻伐複雜寒涼邪說盛行古法晦昧夫血已亡而復破之陽已衰而復泄之危如轉燭主救猶恐不及而尚妄謬為之耶有識者尚其慎之毋為邪說所惑也去疾第十三產後治疾當以溫補為主去瘀次之千金方論曰婦人產訖五藏虛羸惟得將補不可轉瀉若其有病不須快藥若行快藥轉更增虛就中更虛向生路遠朱彥修曰胎前毋滯產後毋虛亮哉斯言不易之法也而方今醫者用法多殊陽虛發熱妄用滋降氣逆作喘謂之痰火豈未見千金諸說耶朱氏為滋陰降火之祖而於產後大熱亦用乾薑雖說理未明而用法則合而宗其說者並此而背之可異也已脈經曰產後之脈洪實不調者死沉微附骨者生又曰沉小者生實大堅強急者死蓋產後當虛沉小而微虛寒之象也當虛反實則陰陽相併氣血瞀亂素問所謂氣並則無血故脈象反盛猶之真藏之脈多屬堅強絕無生意者也知脈理則知治法知治法則知病情矣大凡產後諸疾虛寒者十之六七瘀滯半之內傷外感又半之而總不外溫補二法常有之候曰惡露不行曰發熱曰尿血曰無乳汁曰頭腦心腹腰脅痛曰嘔吐曰淋瀝曰遺溺曰泄痢曰便秘曰陰腫痛癢曰交骨不合其甚者曰傷寒曰中風曰浮腫曰虛實凡此數者世俗犯之有終身不愈者至中風虛勞多歸不治由古法久廢下士多愚非必死之症也惡露之候產後下血過少腹滿而脹痛引少腹牽掣腰背宜加味生化湯生化湯加澤蘭二錢延胡一錢五分益母草三錢甚者逆搶心胸手足厥冷唇乾腹大短氣促喘宜甘草湯甘草湯甘草芍藥桂心阿膠各一兩大黃一兩三錢以東流水三升煮一升內膠令烊分三服見千金方若敗血不下成塊作痛俗謂之兒枕痛乃血瘕也宜失笑散方見拯危篇立效散立效散五靈脂為末每服二錢溫酒調下見局方古鐵酒古鐵五錢火燒令赤以酒三合入淬之溫服見千金方烏賊骨湯治之烏賊骨湯烏賊骨三錢桃仁二錢當歸芎藭芍藥阿膠各一錢五分肉桂五分五靈脂一錢作一服產後發熱其候大熱煩躁晝輕夜重或譫語神昏脈虛大者虛也宜當歸補血湯方見孕疾篇腹內痛有塊者瘀也宜生化湯方見調攝篇感冒者宜補虛加乾薑湯補虛湯加乾薑一錢作一服見丹溪心法四物炮薑湯四物炮薑湯芎藭一錢五分芍藥二錢乾地黃三錢炮姜二錢當歸三錢若因蒸乳而熱者乳必脹痛去乳汁即愈若往來寒熱者宜柴胡湯主之柴胡湯柴胡八錢黃芩人參甘草各一兩生薑六錢大棗十二枚半夏三合以水三升煮一升五合分三服見千金方新產無乳其故有二陽虛陰盛無以化之營血不得溫升故不能生乳體素羸弱者多有之舊說所謂血虛無乳者即此候也宜益陽以化陰溫經以通絡宣營湯主之宣營湯當歸黃耆阿膠各三錢人參五錢芎藭芍藥各二錢川貝母一錢炮姜一錢紅花甘草各五分十味作一服氣滯血阻脈絡不通乳道壅閉亦無乳宜豬蹄湯豬蹄湯豬蹄二枚通草二兩以清酒三升浸之加水一升煮一升飲之見千金方達生編無通草加生黃耆一兩當歸五錢白芷五錢名通脈湯或貝母湯主之貝母湯貝母一錢五分連翹二錢