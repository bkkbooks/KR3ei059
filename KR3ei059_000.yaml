front:
  text: 序粵稽古來產書惟產寶諸方及產育寶慶方見於永樂大典藏於我朝四庫世間多不傳所傳者胎產心法達生篇諸書擇焉不精語為不詳皆不得為善本陽湖張仲遠先生有產孕集一書推原人生受命之始因時調護之力變故挽回之法無乎不備而其措詞雅馴推本陰陽生化之原關睢之亂尤以隱維世道默挽人心所以端本於閨門立極於椎輅其用心深矣至矣其濟世廣矣久矣是書向有刻本風行海內先生自序剴切詳明行篋擦損無可仿寫梓人重刊聊敘顛末光緒二十四年歲在戊戌冬十月長白濟世謹序
  hash: sha256:a36585e1489aaf78cc2a81c37dffef39586f3f948c892c2613a94ef5929dc83f
