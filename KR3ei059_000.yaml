body:
  text: 上篇辨孕第一二氣相感合而生神兩精相搏聚而成形陽奇而施陰偶而承陽施而靜陰承而動靜則陽凝動則陰攝動靜互根形神交倚而孕以成易曰天地絪縕萬物化醇男女構精萬物化生故乾坤消息而變萬類日月運行而生寒暑鳥獸草木昆蟲鱗介之屬莫不附陰化陽因氣成質其生雖不同而所以生者一也人為萬物之靈得天地之正具五德之全經緯蕃變與上下參男稟陽得乾道女稟陰得坤道乾主動而生靜坤主靜而生動乾動則陽施坤靜則陰承陽生靜則氣化而神生陰生動則精融而形成神裕其始而形要其終故孕者始於神而終於形生於陽而成於陰也凡物生易而成難未孕之先兩氣相感如磁引針如珀黏芥適然而合其動以天非陰陽離決氣憊精涸者鮮不凝合自然生化絕無人功即孕之後積氣成形分別百體營建藏府條理絡脈灌溉筋骨閱三百餘日乃成為人日滋月遂盡取給於母氣苟失其道或生而不育形體不具氣血薄弱壽命夭折譬之果實之屬風雪侵之非立見萎落即不適於口故未孕之先無俟人力既孕之後半由人功攝養以安之藥物以助之調其陰陽以煦之絕其賊害以固之祛其疾痛以衛之皆人力之所為也古者婦人別立治法以有月事產孕之異而產孕尤重蓋產孕者生人之始而保護又產孕之始也愚者不察或誤孕為疾而肆其攻擊或誤疾為孕而養虎貽患小則傷體大則傷生深可憫焉辨孕之法素問曰陰搏陽別謂之有子又曰足少陰脈動甚者妊子也脈經曰脈滑疾而重按之散者胎已三月脈重按之不散但疾不滑者五月也又曰三部浮沉正等按之無絕者妊也千金方論曰脈平而虛者乳子法也手少陰脈動甚者妊子也尺中之脈按之不絕者法妊娠也諸家論脈其說不一要不外滑利和平不偏不弊所謂身有病而無病脈身無病而有病脈為簡而易明經閉吐逆體怠惡食而脈反平和是有病而無病脈也外無吐逆諸病體旺如昔而脈反滑利動疾是無病而有病脈也脈象微妙驟不易知差之毫釐謬以千里善診者心領神會毋事固執斯為善也懷妊之候必病惡阻若沉重憒悶不欲飲食又不知患所在頭重眩暈四肢惰懈不欲執作喜啖酸鹹果實多臥少起氣逆嘔吐蓋由經血既閉水漬於藏藏氣不宣血脈不行故有此候察其候合其脈孕之是非無所遁矣若兼有表裡諸疾脈不可辨則別有驗之之法以雀腦芎藭一兩當歸七錢為末分二服煮艾湯或醇酒下之二三時間覺腹中臍間微動即為有孕或以醋煮艾湯半盞服之有孕必大痛無孕則否妊娠四月男女可分脈法左疾為男右疾為女左右俱疾為產二子左手沉實為男右手浮大為女左右俱沉實生二男左右俱浮大生二女左尺偏大為男右尺偏大為女左右尺俱大為產二子又法左尺中浮大者男右尺中沉細者女若脈不可知則有辨法令人按其腹如覆杯者男也如肘項參差起者女也左乳房有核者男也右乳房有核者女也孕婦行坐自後急呼之左回首者男右回首者女蓋左右者陰陽之道路也陽親其左陰親其右自然投托各就其所氣血因之故脈象應之盛於左則左疾而大盛於右則右疾而大其有異孕無所歸屬則兩者皆見尺中者腎部也腎主胞門孕之所在陽具於左故浮大陰具於右故沉細也男形常伏女形常仰故揣腹可知乳為陰府下通胞門陰盛則結各就其位氣血偏盛則身有偏重視其回首可知者必慎護其重也千金方又言男子左乳房結核者生男右乳房結核者生女婦有孕而驗其夫原其所始理亦可通而所以結核之故終不可解矣養孕第二妊娠一月名始胚足厥陰脈養之其經內屬於肝肝主筋及血是時血行否澀毋為力事必令安靜嗜酸鹹食宜麥毋食腥辛若曾孕一月而墮者宜預服補胎湯以養之補胎湯乾地黃一兩白朮一兩生薑一兩防風六錢大麥二合烏梅三合細辛三錢吳茱萸一合八味以水三升煮一升分三服熱而渴者去吳茱萸細辛加栝蔞根三錢見千金方二月名始膏足少陽脈養之其經內屬於膽主精是時精成於胞里若曾孕二月而墮者宜預服黃連湯以養之黃連湯黃連二錢人參三錢吳茱萸一合五勺生薑一兩生地黃一兩六錢共五味以水三升煮一升分四服日一若覺不安加烏梅三合見千金方三月名始胞未有定儀見物而化手心主脈養之其經內屬於心當靜謐以定心氣食谷宜稻羹宜魚若曾孕三月而墮者宜預服茯神湯以養之茯神湯茯神丹參龍骨各三錢阿膠當歸甘草人參各一兩大棗二十一枚赤小豆二十一枚九味水三升煮一升分四服七日後更作腰痛者加桑寄生六錢見千金方四月始受水精以成血脈手少陽脈養之其經內輸於三焦是時形體已具當盛其氣血以通耳目而行輕絡若曾孕四月而墮者宜預服菊花湯以養之菊花湯菊花如雞子大一把麥門冬三合大棗十二枚人參五錢當歸甘草各六錢阿膠一兩生薑一兩六錢八味以水三升煮半內清酒一升並膠煎取一升分二服若受寒者加麻黃見千金方五月始受火精以成其氣足太陰脈養之其經內屬於脾是時四肢皆成宜適飢飽其食宜甘羹宜牛羊和以茱萸養氣以定五藏若曾孕五月而墮者宜預服安中湯以養之安中湯黃芩三錢當歸芎藭乾地黃人參各六錢甘草芍藥各一兩生薑二兩麥門冬三合五味子一合五勺大棗三十五枚十二味以水二升三合清酒一升五合煮取一升分四服日三夜一七日後更作見千金方六月始受金精以成其筋足陽明脈養之其經內屬於胃主口目是時口目皆成身欲微勞以變腠理紉筋以養其力以堅背膂若曾孕六月而墮者宜預服麥門冬湯以養之麥門冬湯麥門冬三合人參甘草黃芩各六錢乾地黃一兩阿膠一兩三錢生薑二兩大棗十五枚八味以水二升三合煮減半內清酒六合並膠煎一升分三服中間進糜粥見千金方七月始受木精以成其骨手太陰脈養之其經內屬於肺主皮毛是時皮毛已成宜勞身動作以運血氣食谷宜粳稻避寒就燥以密腠理以養骨而堅齒若曾孕七月而墮者宜預服蔥白湯以養之蔥白湯蔥白長二寸十四莖麥冬三合旋覆花六勺黃芩三錢人參五錢甘草當歸黃耆各一兩阿膠一兩三錢生薑二兩六錢十味水二升六合煮減半內清酒一升及膠煎一升余分四服日一服溫進見千金方八月始受土精以成膚革手陽明脈養之其經內屬於大腸主九竅是時九竅皆成無使氣極以密腠理而澤顏色若曾孕八月而墮者宜預服芍藥湯以養之芍藥湯芍藥一兩三錢生薑一兩三錢厚朴六錢甘草當歸白朮人參各一兩薤白三合八味以水一升六合酒一升煮一升分三服日一見千金方九月始受石精六府百節莫不畢具足少陰脈養之其經內屬於腎腎主續縷是時經脈續縷皆成穀氣入胃毋犯冷濕飲宜體食宜黍緩帶自持以養毛髮致才力若曾孕九月而墮者宜預服豬腎湯以養之豬腎湯豬腎一具茯苓桑寄生乾薑乾地黃芎藭各一兩白朮一兩三錢附子三錢大豆一合麥門冬三合十味以水三升煮腎令熟去腎納諸藥煎取一升分三服日一見千金方十月足太陽脈養之其經內屬於膀胱五藏完備六腑齊通納天地氣于丹田使關節人神皆備待時而出宜服滑藥以速其生以上本徐之才說若曾孕十月而不產者宜預服八物湯八物湯人參三錢白朮三錢茯苓三錢甘草一錢陳皮一錢芎藭一錢五分當歸三錢熟地黃三錢白芍一錢五分共作一服以水一升煮四合日一服見萬病回春凡孕十月三陰三陽各養三十日內輸五精外受五氣惟手少陰太陽不養心為君主統攝百脈下主月水上為乳汁手太陽合之故不專養天氣盛於東南地氣盛於西北故萬物之生始於東南而成於西北養孕之脈始於足厥陰東方木生氣之原也繼之以手心主南方火長氣育之也繼之以足太陰陽明中央土化氣宣之也繼之以手太陰陽明西方金收氣堅之也繼之以足少陰太陽北方水藏氣成之也天一生水故始受水精土載萬物故終受土精氣以順養精以逆受相生無不及相剋無太過猶之四時遞嬗自春而夏而長夏而秋而冬而一歲成五氣互生自木而火而土而金而水而一人成其理一也孕之生也陰陽相合氣含陰陽則有清濁清者浮升而善動濁者沉濁而善靜動靜相交陽中之陰沉而下降陰中之陽浮而上升陽之升也自東而南陰之降也自西而北陽升於東則魂具而化神陰降於西則魄藏而凝精神化則氣生精凝則質結故孕一月如露珠太極也陰陽之未判者也二月如花蕊太極生兩儀也陽升陰降陰陽之已分者也三月至五月形體具而四肢成陽自東而南陰自西而北五神既宅四維乃張兩儀生四象也六月以後筋骨皮毛九竅百節無不畢具陰陽交育精氣旋生四象生八卦也八卦生而天道備十月盡而人道具所謂萬物一太極一物一太極也知孕之所以生則知所以養之之道矣凡孕三月體虛者宜常服滋生湯滋生湯熟地黃三錢白芍甘草芎藭當歸阿膠各一錢黃芩六分砂仁一錢糯米百粒或參朮養胎飲參朮養胎飲人參一錢白朮三錢茯苓二錢炙甘草八分歸身白芍各一錢五分阿膠二錢陳皮八分體過實者宜金匱當歸散金匱當歸散當歸川芎藭黃芩白朮白芍各一兩治為末每服一錢百沸湯調下見丹溪心法挾寒者宜減味保胎丸減味保胎丸白朮熟地阿膠各二兩當歸杜仲各一兩五錢川斷川芎藭各一兩艾五錢八味搗末杵棗為丸每服五十丸挾熱者宜黃芩散黃芩散黃芩一錢搗末濃煎白朮湯調下日一見丹溪心法或芩術湯芩術湯黃芩三錢白朮一錢五分二味作一服見丹溪心法或白朮丸即前方十倍為丸如桐子大日三十丸見丹溪心法將產體實而旺者宜達生散以速之達生散大腹皮二錢甘草一錢五分當歸白朮白芍各一錢人參陳皮紫蘇枳殼砂仁各五分青蔥五寸十一味作一劑孕九月後服之日一服體旺者至產而止見丹溪心法凡孕無論虛實皆宜服便產方三四月後三十日服一劑八九月二十日服一劑將產之月日一服之是方制合精良無可增減俗傳謂宮中十二味系明嘉靖間太醫所作如法服之絕無難產之患真良方也便產方當歸一錢五分芎藭一錢五分厚朴七分薑汁炒枳殼六分炒菟絲子二錢酒洗艾葉羌活各五分貝母一錢荊芥八分黃耆七分蜜炙白芍一錢二分炒甘草五分水煎隨宜服之見保產輯要孕宜第三人有清濁厚薄之異智愚善惡之殊揆其所始皆由祖氣祖氣者先天之氣也氣清則善氣濁則惡清則聖哲濁則昏愚然而凶頑之質亦生聖人賢哲之嗣或多昏昧何也是豈祖氣之有所變易乎蓋生成有消息之理長養寓補救之方也凡物陽生而陰成生人之初稟氣於父兩氣既合胚胎以凝自此以往日滋月遂至於成人皆由母氣蘊為五神發為五氣育為五精結為五藏開為五官氣以煦之血以濡之得其道則氣厚而神清失其道則氣濁而神昏清則可以反濁濁則可以害清自然之理也譬之稼穡良莠不同由於種之美惡然使土瘠氣薄暘雨不時灌溉失度則雖美種不如荑稗上沃氣厚燥濕均平種雖不良亦必大熟故祖氣者稼穡之種也母氣者土氣也氣煦血濡者暘雨也攝養之道灌溉之力也稼穡不能專恃天時因有灌溉之法生人不能專恃父氣必有補救之方調之使均攝之使平反昧為哲易濁為清精微之道也子居母腹以母氣為氣以母血為血母呼亦呼母吸亦吸善心生則氣血清和而子性醇噁心生則氣血渾濁而子性劣而母氣之清濁善惡又隨時而遷觸物而變非有一成不易之常氣主於心心之神主內而應外外有所接則神動而氣隨之所接善則陽氣動而為清所接惡則陰氣動而為濁故妊子之時必慎所感人生而肖萬物者皆母之感而肖化也古者婦人妊子寢不側坐不邊立不蹕不食邪味割不正不食席不正不坐目不視邪色耳不聽淫聲則生子端正才德過人昔大任有身能以胎教乃生文王之聖君子美之以上本列女傳故舊說謂受孕三月逐物變化使妊母常觀犀象珠玉寶玩之物禮樂鐘磬俎豆之事誦詩書箴誡琴瑟詠歌欲得賢人長者論述古今忠孝之事盛德大業之人則生子多男氣正而質純賢良而壽考亦不過欲和其心志絕其嗜欲使心靜於內慮謐於中清氣充滿濁氣自消即胎教之道也夫草木之生其形色臭味皆秉天理自然之化而何以遷地則形色皆殊而技者又有栽種灌溉之法可以轉白為赤易苦為甘草木尚然況人之至靈者乎至男女之分定於祖氣非人力所能轉移舊有轉女為男之法如系弓弩弦千金方取弓弩弦一枚絳囊盛帶左臂或繫腰下百日後乃去之佩雄黃千金方雄黃一兩絳囊盛帶之置斧床下千金方以斧一柄置妊母床下系刃向上勿令人知或驗或否會其適然然亦可以祛邪辟惡以衛陽氣無損於事若欲服藥物以改之無是理也妊母常食松子令子堅實常食砂仁可令速產達生編云常以麻子油和腐皮食可令滑胎又云始覺有妊以布一幅橫束之上緊下寬至臨產始去可令易生蓋使腹中遏窄胎不上長乍去則驟寬產時便利故也大凡攝養之道在善調其心氣此非醫者所能為夫生子不善人之所惡人之不善雖由習欲實本性生孔子曰惟上知與下愚不移推原其故皆由未生以前理微而顯事小而大在智者心知其意而變通之教於已生之後莫若教於未生之時以可為者責之人以不可為者聽之天是亦為人父母者所當究也孕忌第四生人誕育天理自然陰陽滋化本無災害而每有孕而不固固而不育育而輒夭者豈生化之理有所異哉攝養有乖逆其滋生之道也古者婦人有孕即退居別室謹持胎教故彌月而生無災無害今人不然或有孕而不知不事養護其知者又不知所忌不慎起居勞役失宜舉止違理欲其無患不亦難乎夫人有富貴貧賤之異而誕育則皆同而產孕之變多起於富貴之家人與禽獸各稟氣血以生而禽獸之生初無墮落難產之患豈非嗜欲有多寡之異生理有順逆之分乎懷孕之後首忌交合蓋陰氣動而外泄則分其養孕之力而擾其固孕之權且火動於內營血不安神魂不密形體勞乏筋脈震驚動而漏下半產難產生子多疾而夭淫濁而鈍甚至孕猶未固輒動而墮之一再墮後胞室寒滑隨孕隨墮終身無子而不自知亦可慨矣居處動作最易損傷起於細微人所不覺體候虛羸者尤宜慎之毋登高毋作力毋疾行毋側坐毋曲腰毋跛倚毋高處取物毋向非常處大小便毋久立毋久坐毋久臥毋犯寒熱毋冒霜雪露霧暴雨酷日烈風疾雷毋視日月薄蝕虹霓星變毋觀土木工作及怪獸異鳥奇詭之物毋入神廟寺院睹猙獰險惡之狀一舉一動必謹飭之五志之發鮮能和平而產孕最宜調抑孕藉母氣以生呼吸相通喜怒相應一有偏倚即致子疾宜和其心志毋暴喜毋過思毋怒毋恐毋悲毋憂慮毋鬱結顏無忤色口無惡聲心無雜念使血氣和平德性凝定不特孕安且生子英賢無疾而壽矣其飲食則以沖和澹泊為正節厚味禁腥濁毋飲醇酒毋食異味千金方云食山羊令子多疾食兔令子缺唇食犬肉令子無聲食桑椹鴨卵令子側出心寒食雀令子性淫食鱉令子項短食姜芽令子多指雞合糯米食令子生寸白蟲雞及干鯉魚食令子生瘡食鮮菌令子驚風食冰漿令胎絕食騾馬驢肉無鱗魚螃蟹皆令難產食薏苡莧菜蒜蔥麥芽皆令墮胎其藥味則宜和平調攝毋犯金石毋近毒藥大熱大燥大攻大表大寒大涼走竄迅疾泄利之品咸宜禁止即需施用宜詳酌而慎處之凡妊娠起居飲食惟以和平為上不可太逸逸則氣滯不可太勞勞則氣衰五月以前宜逸五月以後宜勞冬毋太溫夏毋太涼食毋過飽飲毋過多養孕之經不可灸刺無故不宜服藥調之抑之務使無偏則得之矣孕疾第五妊娠諸疾與常人殊故治法亦異子居母腹藉母氣固之母氣不順子不得安必有墮落之患子氣既損母氣亦傷治之者或僅護胎孕不敢攻疾或亟於治疾不顧子氣致子母交損大小殞亡慘烈之禍於此為甚素問曰婦人重身毒之何如曰有故無殞亦無殞也大積大聚可犯之也衰其大半而止夫大積大聚病之重者苟不亟治立見危迫故必毒之使邪去而孕安然恐藥勢太過正氣易傷故衰其大半即止不治古人立法動出萬全不可不究也懷妊之後必患惡阻惡阻者謂噁心阻其飲食也由於經脈既閉藏氣不宣津液停瘀水濕為患故其候四肢沉重惡食嘔吐偏嗜一物頭痛眩暈多臥少起若面色如故脈象和平此不須醫但調其飲食適其寒溫緩緩可愈其甚者大吐嘔血食飲不下寒熱往來心中憒悶惡聞食臭肢節疼痛疲怠自汗色萎肢瘦勢若危殆或施治不善逆其胎氣致暴作吐下困頓欲絕則宜橘皮茯苓湯橘皮茯苓湯橘皮一錢茯苓二錢蘇梗八分歸身一錢五分白芍一錢五分炒砂仁五分生薑搗去汁三錢青竹茹八分炙甘草五分作一服三四服不愈宜半夏茯苓湯三五服必愈半夏茯苓湯半夏茯苓各三錢乾地黃生薑各二錢二分橘皮旋覆花細辛人參芍藥芎藭桔梗甘草各一錢七分十二味以水三升煮取一升分三服若客熱煩渴去細辛加前胡知母各一錢七分若冷痢者去幹地黃加桂心一錢五分熬服後忌生冷醋滑油膩等物見千金方妊娠傷寒以安胎為主無犯胃氣不可妄汗吐下泄利小便其候輕者頭痛煩熱宜芎蘇飲芎蘇飲芎藭紫蘇葉白芍藥白朮麥門冬陳皮乾葛各一錢甘草五分生薑三片蔥白三莖十味作一服見東醫寶鑑甚者壯熱不解欲